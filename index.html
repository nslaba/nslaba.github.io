<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Natalie Slaba - Creative Developer and Visual Artist. Code as canvas, pixels as paint.">

  <title>Natalie Slaba | Tech + Art</title>

  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050508;
      overflow: hidden;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    /* ---- Vignette — fades painting edges to black ---- */
    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background:
        linear-gradient(to right, #050508 0%, transparent 18%, transparent 82%, #050508 100%);
    }

    /* ---- Bottom bar ---- */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem 3rem;
      opacity: 0;
      animation: textIn 2s ease 1.5s forwards;
    }

    .name {
      text-decoration: none;
      transition: color 0.3s;
    }

    .name h1 {
      font-family: 'Roboto Slab', serif;
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      transition: color 0.3s;
    }

    .name:hover h1 {
      color: #fff;
    }

    .separator {
      color: rgba(255,255,255,0.15);
      font-size: 1.2rem;
      user-select: none;
    }

    .mediums {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .mediums-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .medium-link {
      font-family: 'Roboto Slab', serif;
      font-size: 1.1rem;
      font-weight: 300;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      transition: color 0.3s ease;
      letter-spacing: 0.06em;
    }

    .medium-link:hover {
      color: #fff;
    }

    .medium-sep {
      color: rgba(255,255,255,0.2);
      font-size: 0.8rem;
    }

    @keyframes textIn {
      to { opacity: 1; }
    }

    /* ---- Mobile ---- */
    @media (max-width: 768px) {
      .bottom-bar {
        flex-direction: column;
        gap: 1rem;
        padding: 1.5rem 2rem;
      }

      .separator { display: none; }

      .name h1 { font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>
  <div class="vignette"></div>

  <div class="bottom-bar">
    <a href="about.html" class="name"><h1>Natalie Slaba</h1></a>
    <span class="separator">|</span>
    <div class="mediums">
      <span class="mediums-label">mediums:</span>
      <a href="tech/index.html" class="medium-link">Tech</a>
      <span class="medium-sep">&middot;</span>
      <a href="art/index.html" class="medium-link">Art</a>
      <span class="medium-sep">&middot;</span>
      <a href="languages/index.html" class="medium-link">Languages</a>
    </div>
  </div>

  <script>
    // ----------------------------------------------------------------
    // Particle system — image texels with water-like physics
    // Rendering: WebGL 1.0 point sprites (GPU) — physics: JS typed arrays
    // ----------------------------------------------------------------

    const canvas = document.getElementById('canvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

    const startTime = performance.now();
    let mouse = { x: null, y: null, prevX: null, prevY: null };
    let count = 0;

    // --- Tuning ---
    const TARGET_PARTICLES = 200000;
    const RETURN_SPEED     = 0.035;
    const FRICTION         = 0.92;
    const MOUSE_RADIUS     = 100;
    const MOUSE_FORCE      = 3.5;

    // --- Flat typed arrays for particle state (cache-friendly, no object overhead) ---
    const MAX    = TARGET_PARTICLES;
    const posArr  = new Float32Array(MAX * 2); // [x, y] per particle
    const velArr  = new Float32Array(MAX * 2); // [vx, vy]
    const homeArr = new Float32Array(MAX * 2); // [homeX, homeY]
    const colArr  = new Float32Array(MAX * 3); // [r, g, b] normalised 0–1, uploaded once
    const rkArr   = new Float32Array(MAX);     // spring constant per particle
    const frArr   = new Float32Array(MAX);     // friction per particle
    const phArr   = new Float32Array(MAX);     // wave phase per particle

    // --- Shaders ---
    const VS = `
      attribute vec2 a_pos;
      attribute vec3 a_col;
      uniform vec2  u_res;
      uniform float u_ptSize;
      varying vec3  v_col;
      void main() {
        vec2 clip = (a_pos / u_res) * 2.0 - 1.0;
        gl_Position  = vec4(clip.x, -clip.y, 0.0, 1.0);
        gl_PointSize = u_ptSize;
        v_col = a_col;
      }
    `;
    const FS = `
      precision mediump float;
      varying vec3 v_col;
      void main() { gl_FragColor = vec4(v_col, 1.0); }
    `;

    function makeShader(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      return s;
    }

    const prog = gl.createProgram();
    gl.attachShader(prog, makeShader(gl.VERTEX_SHADER,   VS));
    gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, FS));
    gl.linkProgram(prog);
    gl.useProgram(prog);

    const aPos    = gl.getAttribLocation(prog,  'a_pos');
    const aCol    = gl.getAttribLocation(prog,  'a_col');
    const uRes    = gl.getUniformLocation(prog, 'u_res');
    const uPtSize = gl.getUniformLocation(prog, 'u_ptSize');

    // Two GPU buffers: positions upload every frame, colors upload once on image load
    const posBuf = gl.createBuffer();
    const colBuf = gl.createBuffer();

    gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
    gl.enableVertexAttribArray(aCol);
    gl.vertexAttribPointer(aCol, 3, gl.FLOAT, false, 0, 0);

    // --- Canvas / viewport ---
    function resize() {
      canvas.width  = window.innerWidth  * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      gl.viewport(0, 0, canvas.width, canvas.height);
    }

    // --- Load painting & spawn particles ---
    function loadImage(src) {
      const img = new Image();
      img.crossOrigin = 'Anonymous';
      img.onload = function () {
        count = 0;
        const vw = window.innerWidth, vh = window.innerHeight;
        const imgAspect    = img.width / img.height;
        const canvasAspect = vw / vh;
        let drawW, drawH;

        // contain-fit with padding: show entire painting, black space around
        const scale = 0.95;
        if (imgAspect > canvasAspect) {
          drawW = vw * scale; drawH = drawW / imgAspect;
        } else {
          drawH = vh * scale; drawW = drawH * imgAspect;
        }
        const offsetX = (vw - drawW) / 2;
        const offsetY = (vh - drawH) / 2;

        const gap = Math.max(1, Math.round(Math.sqrt((img.width * img.height) / TARGET_PARTICLES)));
        const tmp = document.createElement('canvas');
        const tc  = tmp.getContext('2d');
        tmp.width = img.width; tmp.height = img.height;
        tc.drawImage(img, 0, 0);
        const { data } = tc.getImageData(0, 0, img.width, img.height);

        for (let py = 0; py < img.height; py += gap) {
          for (let px = 0; px < img.width; px += gap) {
            if (count >= MAX) break;
            const wx = offsetX + (px / img.width)  * drawW;
            const wy = offsetY + (py / img.height) * drawH;
            if (wx < -5 || wx > vw + 5 || wy < -5 || wy > vh + 5) continue;
            const i = (py * img.width + px) * 4;
            if (data[i + 3] < 128) continue;

            const p2 = count * 2, p3 = count * 3;
            posArr[p2]     = Math.random() * vw;
            posArr[p2 + 1] = Math.random() * vh;
            homeArr[p2]    = wx;
            homeArr[p2+ 1] = wy;
            velArr[p2]     = (Math.random() - 0.5) * 1.5;
            velArr[p2 + 1] = (Math.random() - 0.5) * 1.5;
            colArr[p3]     = data[i]     / 255;
            colArr[p3 + 1] = data[i + 1] / 255;
            colArr[p3 + 2] = data[i + 2] / 255;
            rkArr[count]   = RETURN_SPEED * (0.8 + Math.random() * 0.4);
            frArr[count]   = FRICTION + (Math.random() - 0.5) * 0.01;
            phArr[count]   = Math.random() * Math.PI * 2;
            count++;
          }
          if (count >= MAX) break;
        }

        // Colors are static — upload once
        gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
        gl.bufferData(gl.ARRAY_BUFFER, colArr.subarray(0, count * 3), gl.STATIC_DRAW);
        gl.vertexAttribPointer(aCol, 3, gl.FLOAT, false, 0, 0);
      };
      img.src = src;
    }

    // --- Render loop ---
    function animate() {
      const t   = (performance.now() - startTime) * 0.001;
      const mx  = mouse.x,    my  = mouse.y;
      const pmx = mouse.prevX, pmy = mouse.prevY;
      const hasMouse = mx !== null;
      const r2  = MOUSE_RADIUS * MOUSE_RADIUS;

      for (let i = 0; i < count; i++) {
        const p2 = i * 2;
        let x  = posArr[p2],  y  = posArr[p2 + 1];
        let vx = velArr[p2],  vy = velArr[p2 + 1];

        if (hasMouse) {
          const dx = x - mx, dy = y - my;
          const dist2 = dx * dx + dy * dy;
          if (dist2 < r2 && dist2 > 1) {
            const dist  = Math.sqrt(dist2);
            const force = ((MOUSE_RADIUS - dist) / MOUSE_RADIUS) * MOUSE_FORCE;
            const nx = dx / dist, ny = dy / dist;
            vx += nx * force;
            vy += ny * force;
            if (pmx !== null) {
              const f = force * 0.1;
              vx += (mx - pmx) * f;
              vy += (my - pmy) * f;
            }
          }
        }

        const rk = rkArr[i], fr = frArr[i], ph = phArr[i];
        vx += (homeArr[p2]     - x) * rk;
        vy += (homeArr[p2 + 1] - y) * rk;
        vx *= fr;
        vy *= fr;
        vx += Math.sin(t * 0.4 + ph) * 0.003;
        vy += Math.cos(t * 0.3 + ph * 1.3) * 0.003;

        posArr[p2]     = x + vx;
        posArr[p2 + 1] = y + vy;
        velArr[p2]     = vx;
        velArr[p2 + 1] = vy;
      }

      gl.clearColor(0, 0, 0, 1);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.uniform2f(uRes, window.innerWidth, window.innerHeight);
      gl.uniform1f(uPtSize, Math.max(1, devicePixelRatio));

      // Upload positions (dynamic each frame), draw
      gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
      gl.bufferData(gl.ARRAY_BUFFER, posArr.subarray(0, count * 2), gl.DYNAMIC_DRAW);
      gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

      gl.drawArrays(gl.POINTS, 0, count);

      mouse.prevX = mx;
      mouse.prevY = my;
      requestAnimationFrame(animate);
    }

    // --- Events ---
    window.addEventListener('mousemove', e => {
      mouse.prevX = mouse.x; mouse.prevY = mouse.y;
      mouse.x = e.clientX;   mouse.y = e.clientY;
    });
    window.addEventListener('mouseleave', () => {
      mouse.x = mouse.y = mouse.prevX = mouse.prevY = null;
    });

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.touches[0];
      mouse.x = t.clientX; mouse.y = t.clientY;
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      mouse.prevX = mouse.x; mouse.prevY = mouse.y;
      const t = e.touches[0];
      mouse.x = t.clientX; mouse.y = t.clientY;
    }, { passive: false });
    canvas.addEventListener('touchend', () => {
      mouse.x = mouse.y = mouse.prevX = mouse.prevY = null;
    });

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        resize();
        loadImage('assets/images/art/feet_cropped.jpg');
      }, 250);
    });

    // --- Boot ---
    resize();
    loadImage('assets/images/art/feet_cropped.jpg');
    animate();
  </script>

</body>
</html>
