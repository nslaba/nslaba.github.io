<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Area Problem | Natalie Slaba</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #0f0f1a;
            --color-surface: #1a1a2e;
            --color-primary: #6366f1;
            --color-secondary: #818cf8;
            --color-accent: #a5b4fc;
            --color-success: #10b981;
            --color-warn: #fbbf24;
            --color-white: #fafafa;
            --color-gray-400: #a3a3a3;
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--color-bg); color: var(--color-white); overflow: hidden; }
        #canvas { display: block; width: 100vw; height: 100vh; }

        .ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        .game-nav { position: absolute; top: 1.5rem; left: 1.5rem; pointer-events: auto; }
        .back-link {
            font-family: var(--font-mono); font-size: 0.8rem; color: var(--color-gray-400);
            text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.2s;
        }
        .back-link:hover { color: var(--color-primary); }

        .level-title {
            position: absolute; top: 1.5rem; left: 50%; transform: translateX(-50%);
            font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--color-primary);
        }
        .objective {
            position: absolute; top: 3.5rem; left: 50%; transform: translateX(-50%);
            font-size: 0.9rem; color: var(--color-gray-400); text-align: center;
            max-width: 420px; line-height: 1.6; padding: 0 1rem;
        }

        .controls {
            position: absolute; right: 2rem; top: 50%; transform: translateY(-50%);
            background: rgba(26, 26, 46, 0.85); border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px; padding: 1.5rem; width: 190px;
            display: flex; flex-direction: column; gap: 1.5rem;
            pointer-events: auto;
        }
        .ctrl-group { display: flex; flex-direction: column; gap: 0.6rem; }
        .ctrl-label {
            font-family: var(--font-mono); font-size: 0.65rem; color: var(--color-gray-400);
            text-transform: uppercase; letter-spacing: 0.1em;
        }
        .n-display {
            font-family: var(--font-mono); font-size: 2.2rem; font-weight: 600;
            color: var(--color-white); text-align: center; line-height: 1;
        }
        .n-slider {
            -webkit-appearance: none; width: 100%; height: 4px;
            background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; cursor: pointer;
        }
        .n-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            border-radius: 50%; background: var(--color-primary); cursor: pointer;
        }
        .method-btns { display: flex; gap: 0.35rem; }
        .method-btn {
            flex: 1; padding: 0.4rem 0;
            font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.05em;
            text-transform: uppercase; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); color: var(--color-gray-400);
            border-radius: 4px; cursor: pointer; transition: all 0.2s;
        }
        .method-btn.active { background: var(--color-primary); border-color: var(--color-primary); color: white; }

        .precision-track {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 3px; overflow: hidden;
        }
        .precision-fill { height: 100%; border-radius: 3px; transition: width 0.25s ease, background 0.25s; }
        .estimate-row {
            font-family: var(--font-mono); font-size: 0.72rem; color: var(--color-gray-400);
            display: flex; flex-direction: column; gap: 0.2rem;
        }
        .estimate-row span { color: var(--color-white); }

        .instruction {
            position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            font-family: var(--font-mono); font-size: 0.8rem; color: var(--color-gray-400);
            background: rgba(255,255,255,0.03); padding: 0.75rem 1.5rem;
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); white-space: nowrap;
        }

        .modal {
            position: absolute; top: 50%; left: 38%; transform: translate(-50%, -50%) scale(0.9);
            background: var(--color-surface); padding: 2.5rem; border-radius: 8px; text-align: left;
            opacity: 0; visibility: hidden;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(99,102,241,0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(99,102,241,0.15);
            pointer-events: auto; width: min(480px, 90vw);
        }
        .modal.show { transform: translate(-50%, -50%) scale(1); opacity: 1; visibility: visible; }
        .modal h2 {
            font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.15em;
            text-transform: uppercase; color: var(--color-success); margin-bottom: 1rem;
        }
        .modal p {
            font-size: 0.92rem; color: var(--color-gray-400); line-height: 1.75; margin-bottom: 0.75rem;
        }
        .modal strong { color: var(--color-white); }
        .formula {
            font-family: var(--font-mono); font-size: 1.1rem; color: var(--color-accent);
            text-align: center; margin: 1.25rem 0; line-height: 1.6;
        }
        .next-btn {
            font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 0.05em;
            text-transform: uppercase; background: transparent; color: var(--color-primary);
            border: 1px solid var(--color-primary); padding: 0.75rem 2rem;
            border-radius: 4px; cursor: pointer; transition: all 0.2s; margin-top: 0.75rem;
            display: block;
        }
        .next-btn:hover { background: var(--color-primary); color: white; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="ui-overlay">
    <nav class="game-nav">
        <a href="../../../index.html" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back to Projects
        </a>
    </nav>

    <div class="level-title" id="levelTitle">Level 1</div>
    <div class="objective" id="objective"></div>

    <div class="controls">
        <div class="ctrl-group">
            <div class="ctrl-label">rectangles (n)</div>
            <div class="n-display" id="nDisplay">4</div>
            <input type="range" class="n-slider" id="nSlider" min="1" max="50" value="4">
        </div>
        <div class="ctrl-group">
            <div class="ctrl-label">method</div>
            <div class="method-btns">
                <button class="method-btn active" data-m="left">Left</button>
                <button class="method-btn" data-m="mid">Mid</button>
                <button class="method-btn" data-m="right">Right</button>
            </div>
        </div>
        <div class="ctrl-group">
            <div class="ctrl-label">precision</div>
            <div class="precision-track">
                <div class="precision-fill" id="precFill" style="width:0%;background:#ef4444"></div>
            </div>
            <div class="estimate-row">
                <div>estimate: <span id="estVal">—</span></div>
                <div>error: <span id="errVal">—</span></div>
            </div>
        </div>
    </div>

    <div class="instruction" id="instruction">Drag the slider · switch methods · get within 2% of the true area</div>

    <div class="modal" id="modal">
        <h2 id="modalTitle"></h2>
        <p id="modalMsg"></p>
        <button class="next-btn" id="nextBtn"></button>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let n = 4, method = 'left', level = 0, done = false;

const levels = [
    {
        title: 'Level 1: The Curved Problem',
        objective: 'A curve doesn\'t have neat edges — you can\'t measure its area with a ruler. Can you get within 2% of the true value?',
        f: x => Math.sin(x) + 1,
        a: 0,
        b: Math.PI,
        yMax: 2.3,
        trueVal: Math.PI + 2,
        xTicks: [{ v: 0, label: '0' }, { v: Math.PI / 2, label: 'π/2' }, { v: Math.PI, label: 'π' }],
        successMsg: 'More rectangles, thinner slices — the estimate sharpened. Each rectangle is a width (Δx) times a height f(x). The total is a sum of those slices.',
    },
    {
        title: 'Level 2: A Different Shape',
        objective: 'Same idea, different curve. Try all three methods — which one converges fastest?',
        f: x => -(x - 2) * (x - 2) / 4 + 2,
        a: 0,
        b: 4,
        yMax: 2.4,
        trueVal: 20 / 3,
        xTicks: [{ v: 0, label: '0' }, { v: 2, label: '2' }, { v: 4, label: '4' }],
        successMsg: 'The midpoint method tends to converge fastest — it cancels errors on each side of the sample point. Left and right methods consistently over- or under-estimate on monotone curves.',
    }
];

let plotLeft, plotRight, plotTop, plotBottom, plotW, plotH;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    plotLeft   = Math.max(60, canvas.width * 0.07);
    plotRight  = Math.min(canvas.width - 240, canvas.width * 0.62);
    plotTop    = canvas.height * 0.18;
    plotBottom = canvas.height * 0.82;
    plotW = plotRight - plotLeft;
    plotH = plotBottom - plotTop;
}
resize();
window.addEventListener('resize', resize);

function cx(x) { const lv = levels[level]; return plotLeft + (x - lv.a) / (lv.b - lv.a) * plotW; }
function cy(y) { const lv = levels[level]; return plotBottom - y / lv.yMax * plotH; }

function riemann(n, method) {
    const lv = levels[level];
    const dx = (lv.b - lv.a) / n;
    let s = 0;
    for (let i = 0; i < n; i++) {
        let x;
        if (method === 'left')  x = lv.a + i * dx;
        else if (method === 'right') x = lv.a + (i + 1) * dx;
        else                    x = lv.a + (i + 0.5) * dx;
        s += lv.f(x) * dx;
    }
    return s;
}

function draw() {
    const lv = levels[level];
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0f0f1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = 'rgba(99,102,241,0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += 50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
    for (let y = 0; y < canvas.height; y += 50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }

    const dx = (lv.b - lv.a) / n;
    const est = riemann(n, method);
    const err = Math.abs(est - lv.trueVal) / lv.trueVal * 100;

    // Update UI
    document.getElementById('nDisplay').textContent = n;
    document.getElementById('estVal').textContent = est.toFixed(3);
    document.getElementById('errVal').textContent = err.toFixed(1) + '%';
    const prec = Math.max(0, 100 - err * 4);
    const pf = document.getElementById('precFill');
    pf.style.width = prec + '%';
    pf.style.background = prec > 85 ? '#10b981' : prec > 55 ? '#fbbf24' : '#ef4444';

    // True area (faint fill)
    ctx.beginPath();
    ctx.moveTo(cx(lv.a), cy(0));
    for (let i = 0; i <= 300; i++) {
        const x = lv.a + (lv.b - lv.a) * i / 300;
        ctx.lineTo(cx(x), cy(lv.f(x)));
    }
    ctx.lineTo(cx(lv.b), cy(0));
    ctx.closePath();
    ctx.fillStyle = 'rgba(99,102,241,0.07)';
    ctx.fill();

    // Rectangles
    for (let i = 0; i < n; i++) {
        const xL = lv.a + i * dx;
        const xR = lv.a + (i + 1) * dx;
        let sx;
        if (method === 'left')  sx = xL;
        else if (method === 'right') sx = xR;
        else                    sx = (xL + xR) / 2;

        const h = lv.f(sx);
        const rx = cx(xL), rw = cx(xR) - cx(xL);
        const rh_top = cy(h), rh_bot = cy(0);

        ctx.fillStyle = 'rgba(99,102,241,0.28)';
        ctx.fillRect(rx, rh_top, rw, rh_bot - rh_top);
        ctx.strokeStyle = 'rgba(163,163,255,0.6)';
        ctx.lineWidth = 1;
        ctx.strokeRect(rx, rh_top, rw, rh_bot - rh_top);

        // Sample point dot
        ctx.fillStyle = 'rgba(165,180,252,0.8)';
        ctx.beginPath();
        ctx.arc(cx(sx), cy(h), 2.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Axes
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(plotLeft - 8, cy(0)); ctx.lineTo(cx(lv.b) + 8, cy(0)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(plotLeft, plotTop - 8); ctx.lineTo(plotLeft, cy(0) + 8); ctx.stroke();

    // Tick labels
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '12px JetBrains Mono, monospace';
    ctx.textAlign = 'center';
    lv.xTicks.forEach(t => {
        ctx.fillText(t.label, cx(t.v), cy(0) + 18);
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cx(t.v), cy(0) - 3); ctx.lineTo(cx(t.v), cy(0) + 3); ctx.stroke();
    });
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('0', plotLeft - 8, cy(0) + 4);

    // True value label
    ctx.fillStyle = 'rgba(99,102,241,0.5)';
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.textAlign = 'left';
    ctx.fillText('true area: ' + lv.trueVal.toFixed(3), plotLeft, plotTop - 10);

    // Curve (on top)
    ctx.beginPath();
    ctx.strokeStyle = '#a5b4fc';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    for (let i = 0; i <= 300; i++) {
        const x = lv.a + (lv.b - lv.a) * i / 300;
        i === 0 ? ctx.moveTo(cx(x), cy(lv.f(x))) : ctx.lineTo(cx(x), cy(lv.f(x)));
    }
    ctx.stroke();

    // Win check
    if (err < 2 && !done) {
        done = true;
        setTimeout(() => showSuccess(err), 700);
    }
}

function showSuccess(err) {
    const lv = levels[level];
    document.getElementById('modalTitle').textContent =
        err.toFixed(1) + '% error — level complete';
    document.getElementById('modalMsg').innerHTML = lv.successMsg;

    const btn = document.getElementById('nextBtn');
    if (level < levels.length - 1) {
        btn.textContent = 'Next Level';
        btn.onclick = () => {
            document.getElementById('modal').classList.remove('show');
            level++; n = 4; done = false;
            document.getElementById('nSlider').value = 4;
            loadLevel();
        };
    } else {
        btn.textContent = 'See the big picture';
        btn.onclick = () => { document.getElementById('modal').classList.remove('show'); showReveal(); };
    }
    document.getElementById('modal').classList.add('show');
}

function showReveal() {
    done = true;
    document.getElementById('levelTitle').textContent = 'The Definite Integral';
    document.getElementById('objective').textContent = '';
    document.getElementById('instruction').style.visibility = 'hidden';
    document.querySelector('.controls').style.visibility = 'hidden';

    document.getElementById('modalTitle').textContent = 'You just discovered integration';
    document.getElementById('modalMsg').innerHTML =
        'Every rectangle was <strong>f(x) · Δx</strong> — height times width, a thin slice of area. ' +
        'Adding them up is a Riemann sum.<br><br>' +
        'As n grows toward infinity, the slices get infinitely thin and the sum converges to an exact value. ' +
        'That limit is the <strong>definite integral</strong>:';
    document.getElementById('modalMsg').insertAdjacentHTML('beforeend',
        '<div class="formula">∫<sub>a</sub><sup>b</sup> f(x) dx &nbsp;=&nbsp; lim<sub>n→∞</sub> Σ f(xᵢ) Δx</div>');

    const btn = document.getElementById('nextBtn');
    btn.textContent = 'Play again';
    btn.onclick = () => {
        document.getElementById('modal').classList.remove('show');
        document.getElementById('instruction').style.visibility = '';
        document.querySelector('.controls').style.visibility = '';
        level = 0; n = 4; done = false; method = 'left';
        document.getElementById('nSlider').value = 4;
        document.querySelectorAll('.method-btn').forEach(b => b.classList.toggle('active', b.dataset.m === 'left'));
        loadLevel();
    };
    document.getElementById('modal').classList.add('show');
}

function loadLevel() {
    const lv = levels[level];
    document.getElementById('levelTitle').textContent = lv.title;
    document.getElementById('objective').textContent = lv.objective;
}

// Events
document.getElementById('nSlider').addEventListener('input', e => { n = +e.target.value; });
document.querySelectorAll('.method-btn').forEach(b => {
    b.addEventListener('click', () => {
        method = b.dataset.m;
        document.querySelectorAll('.method-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
    });
});

loadLevel();

function loop() { draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
